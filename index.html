<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Abusement Park | FPL Mini League History</title>
  <meta name="description" content="Hall of Fame for The Abusement Park FPL mini-league — 18 seasons of winners, stats, and season archives since 2008/09.">
  <meta property="og:title" content="The Abusement Park | FPL Mini League History">
  <meta property="og:description" content="18 seasons of suffering &amp; glory. All-time champions, filters, and season-by-season archive.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://theabusementpark.com/">
  <meta property="og:image" content="https://theabusementpark.com/images/fpllogo.png">
  <link rel="icon" href="images/fpllogo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #10141c;
      --surface-light: #1a1f2e;
      --border: #1e2530;
      --accent: #38ef7d;
      --gold: #f5c842;
      --silver: #b0b8c8;
      --bronze: #cd7f32;
      --text: #e8edf5;
      --muted: #5a6478;
      --fpl-purple: #6938ef;
      --fpl-cyan: #00ff87;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
      line-height: 1.6;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(105,56,239,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(56,239,125,0.08) 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,37,48,0.4) 39px, rgba(30,37,48,0.4) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,37,48,0.2) 39px, rgba(30,37,48,0.2) 40px);
    }

    .container { width: 100%; max-width: 800px; margin: 0 auto; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }

    .league-tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--fpl-cyan);
      text-transform: uppercase;
      border: 1px solid rgba(0,255,135,0.2);
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 8px;
      background: rgba(0,255,135,0.04);
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 10vw, 72px);
      letter-spacing: 0.02em;
      line-height: 0.95;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 40%, var(--fpl-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .hall-of-fame {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 12vw, 96px);
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 4px 0 16px;
      text-shadow: 0 0 40px rgba(245,200,66,0.5);
    }

    .hall-of-fame {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 8vw, 56px);
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 8px 0 16px;
      text-shadow: 0 0 30px rgba(245,200,66,0.4);
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── Stats ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .stat {
      background: linear-gradient(145deg, var(--surface-light), var(--surface));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 8px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }

    .stat::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--fpl-purple));
    }

    .stat:hover { transform: translateY(-2px); border-color: rgba(56,239,125,0.3); }

    .stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(24px, 6vw, 32px);
      background: linear-gradient(135deg, var(--accent), var(--fpl-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .stat-lbl {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      transition: all 0.15s ease;
    }

    .filter-btn:hover { border-color: rgba(56,239,125,0.4); color: var(--text); }

    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: linear-gradient(135deg, rgba(56,239,125,0.1), rgba(105,56,239,0.1));
      box-shadow: 0 0 20px rgba(56,239,125,0.1);
    }

    /* ── Table ── */
    .table-wrap {
      background: linear-gradient(145deg, var(--surface-light), var(--surface));
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeUp 0.6s 0.35s ease both;
    }

    .table-head {
      display: grid;
      grid-template-columns: 50px 1fr 80px;
      padding: 12px 16px;
      background: linear-gradient(90deg, rgba(56,239,125,0.05), rgba(105,56,239,0.05));
      border-bottom: 1px solid var(--border);
    }

    .th {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .th.center { text-align: center; }

    .row {
      display: grid;
      grid-template-columns: 50px 1fr 80px;
      padding: 12px 16px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      min-height: 60px;
      transition: background 0.15s ease;
      animation: rowIn 0.4s ease both;
    }

    .row:last-child { border-bottom: none; }
    .row:hover { background: rgba(255,255,255,0.02); }

    .row.rank-1 { background: linear-gradient(90deg, rgba(245,200,66,0.08), transparent); border-left: 3px solid var(--gold); }
    .row.rank-2 { background: linear-gradient(90deg, rgba(176,184,200,0.06), transparent); border-left: 3px solid var(--silver); }
    .row.rank-3 { background: linear-gradient(90deg, rgba(205,127,50,0.06), transparent); border-left: 3px solid var(--bronze); }

    /* Keep left border space consistent for non-ranked rows */
    .row:not(.rank-1):not(.rank-2):not(.rank-3) { border-left: 3px solid transparent; }

    .rank-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--muted);
      padding-left: 4px;
    }

    .rank-1 .rank-num { color: var(--gold); text-shadow: 0 0 10px rgba(245,200,66,0.3); }
    .rank-2 .rank-num { color: var(--silver); }
    .rank-3 .rank-num { color: var(--bronze); }

    .manager-col {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      flex-shrink: 0;
      border: 2px solid var(--border);
      transition: transform 0.2s;
    }

    .avatar:hover { transform: scale(1.1); }

    .manager-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .manager-titles {
      display: flex;
      gap: 3px;
      margin-top: 2px;
      flex-wrap: wrap;
    }

    .season-badge {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 3px;
      color: var(--accent);
      border: 1px solid rgba(56,239,125,0.25);
      background: rgba(56,239,125,0.06);
    }

    .wins-col {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .wins-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      line-height: 1;
    }

    .trophy-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #ff9500);
      opacity: 0.85;
      flex-shrink: 0;
    }

    /* ── Streak badge ── */
    .streak-badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 3px;
      color: var(--gold);
      border: 1px solid rgba(245,200,66,0.35);
      background: rgba(245,200,66,0.07);
      margin-left: 4px;
      white-space: nowrap;
      vertical-align: middle;
    }

    /* ── History ── */
    .history-section {
      margin-top: 32px;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--text);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }

    .history-card {
      background: linear-gradient(145deg, var(--surface-light), var(--surface));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .history-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .history-card:hover {
      border-color: rgba(56,239,125,0.4);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .history-card:hover::before { opacity: 1; }

    /* Current season glow */
    .history-card.current-season {
      border-color: rgba(56,239,125,0.35);
      box-shadow: 0 0 16px rgba(56,239,125,0.1);
    }

    .history-card.current-season::before { opacity: 1; }

    .trophy-icon {
      font-size: 24px;
      filter: drop-shadow(0 0 8px rgba(245,200,66,0.4));
      line-height: 1;
    }

    .history-season {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .history-winner {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .current-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
    }

    /* ── Modal ── */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(10,12,16,0.95);
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      padding: 20px;
    }

    .modal.active { display: flex; animation: fadeIn 0.2s ease; }

    .modal-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      max-width: 100%;
      cursor: default;
    }

    .modal img {
      max-width: 100%;
      max-height: calc(100vh - 80px);
      border-radius: 8px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: scaleIn 0.3s ease;
    }

    .modal-error {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      padding: 24px 32px;
      border: 1px dashed var(--border);
      border-radius: 8px;
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      z-index: 1;
      background: none;
      border: none;
      font-size: 36px;
      color: var(--muted);
      line-height: 1;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.2s;
    }

    .modal-close:hover { color: var(--text); }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .table-head, .row { grid-template-columns: 40px 1fr 60px; padding: 10px 12px; }
      .manager-name { font-size: 13px; }
      .avatar { width: 32px; height: 32px; font-size: 12px; }
      .wins-count { font-size: 18px; }
      .history-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Keyframes ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .row:nth-child(1) { animation-delay: 0.35s; }
    .row:nth-child(2) { animation-delay: 0.42s; }
    .row:nth-child(3) { animation-delay: 0.49s; }
    .row:nth-child(4) { animation-delay: 0.56s; }
    .row:nth-child(5) { animation-delay: 0.63s; }
    .row:nth-child(6) { animation-delay: 0.70s; }
    .row:nth-child(7) { animation-delay: 0.77s; }
    .row:nth-child(8) { animation-delay: 0.84s; }
    .row:nth-child(9) { animation-delay: 0.91s; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">The Abusement Park</h1>
      <div class="league-tag">Fantasy Premier League</div>
      <h2 class="hall-of-fame">Hall of Fame</h2>
      <p class="subtitle">18 seasons of suffering &amp; glory · 2008/09 — 2025/26</p>
    </header>

    <div class="stats-bar" id="stats-bar" aria-label="League statistics">
      <!-- Populated by JS so filters can update it -->
    </div>

    <div class="filter-bar" role="tablist" aria-label="Filter standings">
      <button type="button" id="tab-all" class="filter-btn active" data-mode="all" role="tab" aria-controls="standings-panel" aria-selected="true">All Time</button>
      <button type="button" id="tab-last5" class="filter-btn" data-mode="last5" role="tab" aria-controls="standings-panel" aria-selected="false">Last 5</button>
      <button type="button" id="tab-last10" class="filter-btn" data-mode="last10" role="tab" aria-controls="standings-panel" aria-selected="false">Last 10</button>
    </div>

    <div class="table-wrap" id="standings-panel" role="tabpanel" aria-labelledby="tab-all">
      <div class="table-head">
        <div class="th">#</div>
        <div class="th">Manager</div>
        <div class="th center">Titles</div>
      </div>
      <div id="standings"></div>
    </div>

    <section class="history-section">
      <div class="section-header">
        <h2 class="section-label">Season Archive</h2>
        <div class="section-line"></div>
      </div>
      <div class="history-grid" id="history"></div>
    </section>
  </div>

  <div id="lightbox" class="modal" role="dialog" aria-modal="true" aria-labelledby="lightbox-title" hidden>
    <button type="button" class="modal-close" id="lightbox-close" aria-label="Close">&times;</button>
    <div class="modal-content">
      <p id="lightbox-title" class="sr-only">Season screenshot</p>
      <img id="lightbox-img" src="" alt="">
      <p id="lightbox-error" class="modal-error" hidden>Screenshot not available for this season yet.</p>
    </div>
  </div>

  <script>
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const seasons = [
      { year: "2008/09", winner: "Mac Alvi",                   img: "images/2009.png" },
      { year: "2009/10", winner: "Mac Alvi",                   img: "images/2010.png" },
      { year: "2010/11", winner: "Anjishu Bhattacharjee",      img: "images/2011.png" },
      { year: "2011/12", winner: "Shamjid Siraj",              img: "images/2012.png" },
      { year: "2012/13", winner: "Arka Basak",                 img: "images/2013.png" },
      { year: "2013/14", winner: "Arka Basak",                 img: "images/2014.png" },
      { year: "2014/15", winner: "Mac Alvi",                   img: "images/2015.png" },
      { year: "2015/16", winner: "Abrar Siddique",             img: "images/2016.png" },
      { year: "2016/17", winner: "Rainul Islam",               img: "images/2017.png" },
      { year: "2017/18", winner: "Abrar Siddique",             img: "images/2018.png" },
      { year: "2018/19", winner: "Irfan Ahmed",                img: "images/2019.png" },
      { year: "2019/20", winner: "Ohidul Islam",               img: "images/2020.png" },
      { year: "2020/21", winner: "Abrar Siddique",             img: "images/2021.png" },
      { year: "2021/22", winner: "Abrar Siddique",             img: "images/2022.png" },
      { year: "2022/23", winner: "Mac Alvi",                   img: "images/2023.png" },
      { year: "2023/24", winner: "Mac Alvi",                   img: "images/2024.png" },
      { year: "2024/25", winner: "Sajid Sadman",               img: "images/2025.png" },
      { year: "2025/26", winner: "Abrar Siddique",             img: "images/2026.png" },
    ];

    const AVATAR_COLORS = [
      ["#38ef7d","#0a0c10"], ["#f5c842","#0a0c10"], ["#ff4d6d","#fff"],
      ["#818cf8","#fff"],    ["#fb923c","#0a0c10"], ["#34d399","#0a0c10"],
      ["#e879f9","#fff"],    ["#60a5fa","#0a0c10"], ["#f87171","#fff"],
    ];

    // Stable color assignment — keyed to manager name across filter changes
    const colorMap = {};
    let colorIdx = 0;
    function avatarColor(name) {
      if (!colorMap[name]) colorMap[name] = AVATAR_COLORS[colorIdx++ % AVATAR_COLORS.length];
      return colorMap[name];
    }

    // Detect consecutive win streaks at the END of a dataset
    function trailingStreak(data, name) {
      let streak = 0;
      for (let i = data.length - 1; i >= 0; i--) {
        if (data[i].winner === name) streak++;
        else break;
      }
      return streak;
    }

    function updateView(mode, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-selected', 'true');

      let data = seasons;
      if (mode === 'last5')  data = seasons.slice(-5);
      if (mode === 'last10') data = seasons.slice(-10);

      const tally = {};
      data.forEach(s => { tally[s.winner] = (tally[s.winner] || 0) + 1; });
      const sorted = Object.entries(tally).sort((a,b) => b[1]-a[1]);
      const total  = data.length;

      // Unique champion count
      const uniqueChamps = Object.keys(tally).length;

      const panel = document.getElementById('standings-panel');
      panel.setAttribute('aria-labelledby', btn.id);

      const statsBar = document.getElementById('stats-bar');
      const leader = sorted[0]?.[0]?.split(' ')[0] || '—';
      const runner = sorted[1]?.[0]?.split(' ')[0] || '—';
      statsBar.innerHTML = `
        <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">Seasons</div></div>
        <div class="stat"><div class="stat-val">${uniqueChamps}</div><div class="stat-lbl">Champions</div></div>
        <div class="stat"><div class="stat-val">${sorted[0]?.[1] || 0}</div><div class="stat-lbl">${escapeHtml(leader)} Titles</div></div>
        <div class="stat"><div class="stat-val">${sorted[1]?.[1] || 0}</div><div class="stat-lbl">${escapeHtml(runner)} Titles</div></div>
      `;

      // Build standings
      const standingsEl = document.getElementById('standings');
      standingsEl.innerHTML = '';

      sorted.forEach(([name, wins], i) => {
        const [bg, fg] = avatarColor(name);
        const safeName = escapeHtml(name);
        const initials  = name.split(' ').map(w=>w[0]).slice(0,2).join('');
        const wonYears  = data.filter(s => s.winner === name).map(s => s.year.slice(-2));
        const streak    = trailingStreak(data, name);

        const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
        const color     = i === 0 ? 'var(--gold)' : i === 1 ? 'var(--silver)' : i === 2 ? 'var(--bronze)' : 'var(--text)';
        const streakTag = streak >= 2
          ? `<span class="streak-badge" title="${streak} seasons in a row">🔥 ×${streak}</span>`
          : '';

        const row = document.createElement('div');
        row.className = `row ${rankClass}`;
        row.innerHTML = `
          <div class="rank-num">${i + 1}</div>
          <div class="manager-col" title="${safeName}">
            <div class="avatar" style="background:${bg};color:${fg}">${escapeHtml(initials)}</div>
            <div>
              <div class="manager-name">${safeName}${streakTag}</div>
              <div class="manager-titles">
                ${wonYears.map(y => `<span class="season-badge">${escapeHtml(y)}</span>`).join('')}
              </div>
            </div>
          </div>
          <div class="wins-col">
            <div class="wins-count" style="color:${color}">${wins}</div>
            ${Array(wins).fill('<div class="trophy-dot"></div>').join('')}
          </div>
        `;
        standingsEl.appendChild(row);
      });
    }

    let lightboxReturnFocus = null;

    function openLightbox(imgSrc, seasonYear) {
      const modal = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      const err = document.getElementById('lightbox-error');
      const title = document.getElementById('lightbox-title');

      lightboxReturnFocus = document.activeElement;
      title.textContent = `Final league table – ${seasonYear}`;
      img.alt = `Final league table – ${seasonYear}`;
      img.hidden = false;
      err.hidden = true;

      img.onload = () => {
        img.hidden = false;
        err.hidden = true;
      };
      img.onerror = () => {
        img.hidden = true;
        err.hidden = false;
      };

      img.src = '';
      img.src = imgSrc;
      modal.hidden = false;
      modal.classList.add('active');
      document.getElementById('lightbox-close').focus();
      document.addEventListener('keydown', handleLightboxKeydown);
    }

    function closeLightbox() {
      const modal = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      modal.classList.remove('active');
      modal.hidden = true;
      img.src = '';
      img.onload = null;
      img.onerror = null;
      document.removeEventListener('keydown', handleLightboxKeydown);
      if (lightboxReturnFocus?.focus) lightboxReturnFocus.focus();
      lightboxReturnFocus = null;
    }

    function handleLightboxKeydown(e) {
      if (e.key === 'Escape') closeLightbox();
    }

    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    });
    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);

    document.querySelector('.filter-bar').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (btn) updateView(btn.dataset.mode, btn);
    });

    // Build history grid
    const historyEl  = document.getElementById('history');
    const latestYear = seasons[seasons.length - 1].year;

    [...seasons].reverse().forEach(s => {
      const isCurrent = s.year === latestYear;
      const card = document.createElement('div');
      card.className = `history-card${isCurrent ? ' current-season' : ''}`;
      card.addEventListener('click', () => openLightbox(s.img, s.year));
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', `View ${s.year} standings won by ${s.winner}`);
      card.innerHTML = `
        <div class="trophy-icon" aria-hidden="true">🏆</div>
        <div class="history-season">${escapeHtml(s.year)}</div>
        <div class="history-winner">${escapeHtml(s.winner.split(' ')[0])}</div>
        ${isCurrent ? '<div class="current-label">Latest</div>' : ''}
      `;
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(s.img, s.year); }
      });
      historyEl.appendChild(card);
    });

    // Init
    updateView('all', document.querySelector('.filter-btn'));
  </script>
</body>
</html>
