<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Abusement Park | FPL Mini-League</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --accent-gold: #feca57;
            --accent-red: #ff6b6b;
            --text-primary: #f0f0f0;
            --text-secondary: #888;
            --border: #333;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            line-height: 1.6;
        }
        
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent-red) 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .tagline {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        .league-info {
            margin: 2rem 0;
            padding: 1rem 2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
        }
        
        .league-info p {
            color: var(--text-secondary);
        }
        
        .seasons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
        }
        
        .season-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }
        
        .season-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-red);
        }
        
        .season-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
            background: var(--bg-primary);
        }
        
        .season-card-content {
            padding: 1.25rem;
        }
        
        .season-card h3 {
            font-size: 1.2rem;
            margin-bottom: 0.25rem;
            color: var(--accent-gold);
        }
        
        .season-card .winner {
            color: var(--accent-gold);
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }
        
        .season-card p:last-child {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        footer {
            margin-top: auto;
            padding-top: 3rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .seasons-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🏆</div>
        <h1>The Abusement Park</h1>
        <p class="tagline">Fantasy Premier League Mini-League since 2008</p>
    </header>
    
    <div class="league-info">
        <p>18 seasons of glory, heartbreak, and tactical genius</p>
    </div>
    
    <main class="seasons-grid" id="seasonsGrid">
        <!-- Seasons populated by script.js -->
    </main>
    
    <footer>
        <p>© The Abusement Park | <a href="https://theabusementpark.com" style="color: var(--accent-gold); text-decoration: none;">theabusementpark.com</a></p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
