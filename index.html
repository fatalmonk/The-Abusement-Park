<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Abusement Park | FPL Mini League History</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #10141c; --border: #1e2530; --accent: #38ef7d;
    --accent2: #11998e; --gold: #f5c842; --silver: #b0b8c8; --bronze: #cd7f32;
    --text: #e8edf5; --muted: #5a6478;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 40px 20px; min-height: 100vh; }
  .container { width: 100%; max-width: 720px; margin: 0 auto; }
  
  .header { text-align: center; margin-bottom: 36px; }
  .title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 10vw, 80px); line-height: 0.9; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  .stats-bar { display: flex; gap: 1px; background: var(--border); border-radius: 6px; margin-bottom: 28px; overflow: hidden; }
  .stat { flex: 1; background: var(--surface); padding: 14px; text-align: center; }
  .stat-val { font-family: 'Bebas Neue'; font-size: 28px; color: var(--accent); }
  .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; }

  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; justify-content: flex-end; }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: 'DM Mono'; font-size: 11px; }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .table-head { display: grid; grid-template-columns: 48px 1fr 80px 80px; padding: 10px 20px; background: rgba(56,239,125,0.04); border-bottom: 1px solid var(--border); }
  .th { font-family: 'DM Mono'; font-size: 10px; color: var(--muted); text-transform: uppercase; }
  .row { display: grid; grid-template-columns: 48px 1fr 80px 80px; padding: 10px 20px; align-items: center; border-bottom: 1px solid var(--border); }
  .manager-col { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: var(--bg); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 14px; }
  
  .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-top: 20px; }
  .history-card { background: var(--surface); border: 1px solid var(--border); padding: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
  .history-card:hover { border-color: var(--accent); background: rgba(56,239,125,0.05); }

  .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(10,12,16,0.95); align-items: center; justify-content: center; }
  .modal img { max-width: 90%; max-height: 80vh; border-radius: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">The Abusement Park</div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val">18</div><div class="stat-lbl">Seasons</div></div>
    <div class="stat"><div class="stat-val">9</div><div class="stat-lbl">Champions</div></div>
    <div class="stat"><div class="stat-val">5</div><div class="stat-lbl">Mac's Titles</div></div>
    <div class="stat"><div class="stat-val">5</div><div class="stat-lbl">Abrar's Titles</div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="updateView('all', this)">All Time</button>
    <button class="filter-btn" onclick="updateView('last5', this)">Last 5</button>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <div class="th">#</div><div class="th">Manager</div><div class="th">Titles</div><div class="th">Share</div>
    </div>
    <div id="standings"></div>
  </div>

  <div class="history-grid" id="history"></div>
</div>

<div id="lightbox" class="modal" onclick="this.style.display='none'">
  <img id="lightbox-img" src="" alt="Season Table">
</div>

<script>
const seasons = [
  { year: "2008/09", winner: "Mac Alvi", img: "images/2009.png" },
  { year: "2009/10", winner: "Mac Alvi", img: "images/2010.png" },
  { year: "2010/11", winner: "Anjishu Bhattacharjee", img: "images/2011.png" },
  { year: "2011/12", winner: "Shamjid Siraj", img: "images/2012.png" },
  { year: "2012/13", winner: "Arka Basak", img: "images/2013.png" },
  { year: "2013/14", winner: "Arka Basak", img: "images/2014.png" },
  { year: "2014/15", winner: "Mac Alvi", img: "images/2015.png" },
  { year: "2015/16", winner: "Abrar Siddique", img: "images/2016.png" },
  { year: "2016/17", winner: "Rainul Islam", img: "images/2017.png" },
  { year: "2017/18", winner: "Abrar Siddique", img: "images/2018.png" },
  { year: "2018/19", winner: "Irfan Ahmed", img: "images/2019.png" },
  { year: "2019/20", winner: "Ohidul Islam", img: "images/2020.png" },
  { year: "2020/21", winner: "Abrar Siddique", img: "images/2021.png" },
  { year: "2021/22", winner: "Abrar Siddique", img: "images/2022.png" },
  { year: "2022/23", winner: "Mac Alvi", img: "images/2023.png" },
  { year: "2023/24", winner: "Mac Alvi", img: "images/2024.png" },
  { year: "2024/25", winner: "Sajid Sadman", img: "images/2025.png" },
  { year: "2025/26", winner: "Abrar Siddique", img: "images/2026.png" }
];

const trophySVG = `<svg width="12" height="12" viewBox="0 0 16 16" fill="var(--gold)"><path d="M2.5.5A.5.5 0 0 1 3 0h10a.5.5 0 0 1 .5.5q0 .807-.034 1.536a3 3 0 1 1-1.133 5.89c-.79 1.865-1.878 2.777-2.833 3.011v2.173l1.425.356c.194.048.377.135.537.255L13.3 15.1a.5.5 0 0 1-.3.9H3a.5.5 0 0 1-.3-.9l1.838-1.506c.16-.12.343-.207.537-.255L6.5 13.086v-2.173c-.955-.234-2.043-1.146-2.833-3.011a3 3 0 1 1-1.133-5.89A5 5 0 0 1 2.5.5"/></svg>`;

function updateView(mode, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const data = mode === 'last5' ? seasons.slice(-5) : seasons;
  const tally = {};
  data.forEach(s => tally[s.winner] = (tally[s.winner] || 0) + 1);
  const sorted = Object.entries(tally).sort((a,b) => b[1]-a[1]);
  
  const standingsEl = document.getElementById('standings');
  standingsEl.innerHTML = sorted.map(([name, wins], i) => `
    <div class="row">
      <div class="rank-num">${i+1}</div>
      <div class="manager-col"><div class="avatar">${name.split(' ').map(n=>n[0]).join('')}</div>${name}</div>
      <div>${wins} ${trophySVG}</div>
      <div>${Math.round((wins/data.length)*100)}%</div>
    </div>`).join('');
}

const historyEl = document.getElementById('history');
[...seasons].reverse().forEach(s => {
  historyEl.innerHTML += `
    <div class="history-card" onclick="document.getElementById('lightbox-img').src='${s.img}'; document.getElementById('lightbox').style.display='flex'">
      <div>🏆</div>
      <div><div style="font-size:10px; color:var(--muted)">${s.year}</div><div style="font-size:12px; font-weight:600">${s.winner.split(' ')[0]}</div></div>
    </div>`;
});

updateView('all', document.querySelector('.filter-btn'));
</script>
</body>
</html>
